services:
  # 🐍 Backend (Flask + SocketIO)
  - type: web
    name: zomathon-backend
    env: python
    rootDir: .
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn -k eventlet -w 1 server.run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zomathon-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000

  # ⚛️ Frontend (React + Vite)
  - type: static
    name: zomathon-frontend
    env: node
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: zomathon-backend
          property: host
        sync: false
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: zomathon-backend
          property: host
        sync: false

# 🐘 Database (PostgreSQL)
databases:
  - name: zomathon-db
    plan: free
